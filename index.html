<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site unavailable</title>
<meta property="og:title" content="Site unavailable">
<meta property="og:description" content="This site is no longer accessible.">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Site unavailable">
<meta name="twitter:description" content="This site is no longer accessible.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #f7f4ee;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    max-width: 420px;
    text-align: center;
  }
  .card h1 {
    font-size: clamp(20px, 4vw, 26px);
    color: #2a2a26;
    margin-bottom: 14px;
  }
  .card p {
    font-size: clamp(14px, 2.4vw, 16px);
    line-height: 1.6;
    color: #6b665c;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>This site is no longer accessible.</h1>
    <p>Kindly contact the owner to regain access.</p>
  </div>
</body>
</html>
