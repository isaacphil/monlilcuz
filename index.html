<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Access Denied</title>
<meta property="og:title" content="Access Denied">
<meta property="og:description" content="Your VIP reading privileges have been revoked due to chronic procrastination.">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Access Denied">
<meta name="twitter:description" content="Your VIP reading privileges have been revoked due to chronic procrastination.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #1e2226;
  }
  body {
    display: flex;
    flex-direction: column;
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  footer {
    flex-shrink: 0;
    padding: 0 24px 26px;
    text-align: center;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #6b7278;
  }
  .card {
    max-width: 380px;
    width: 100%;
    text-align: center;
    padding: 44px 36px;
    background: #fffefb;
    border-radius: 10px;
    box-shadow: 0 1px 3px rgba(0,0,0,.2), 0 20px 44px rgba(0,0,0,.35);
  }
  .seal {
    width: 46px;
    height: 46px;
    margin: 0 auto 22px;
    border-radius: 50%;
    background: #e8e6df;
    border: 1.5px solid #b9c2c6;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .label {
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #a7a196;
    margin-bottom: 24px;
  }
  .divider {
    width: 30px;
    height: 1px;
    background: #dcd6c8;
    margin: 0 auto 24px;
  }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(19px, 4vw, 23px);
    line-height: 1.4;
    color: #25231f;
    margin-bottom: 14px;
  }
  p {
    font-size: clamp(14px, 2.4vw, 15.5px);
    line-height: 1.65;
    color: #6f7a80;
  }
</style>
</head>
<body>
  <main>
    <div class="card">
      <div class="label">A letter for you</div>
      <div class="divider"></div>
      <div class="seal">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4a5257" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="14" rx="2"></rect>
          <path d="M3 7l9 6 9-6"></path>
        </svg>
      </div>
      <h1>🚨 ACCESS DENIED 🚨</h1>
      <p>Your VIP reading privileges have been revoked due to chronic procrastination. To appeal this decision, please submit a formal apology to the Sovereign.</p>
    </div>
  </main>
  <footer>© 2026 &nbsp;·&nbsp; Website by Isaac Philip</footer>
</body>
</html>
