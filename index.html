<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login</title>
<style>
  :root{
    --bg:#0f1720; --card:#182430; --ink:#eaf0f6; --muted:#9fb0c0;
    --accent:#4f9cf9; --accent-ink:#ffffff; --err:#ff6b6b; --line:#2a3a49;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#1b2a3a,var(--bg));
    color:var(--ink); display:grid; place-items:center; padding:24px;
  }
  .card{
    width:100%; max-width:380px; background:var(--card); border:1px solid var(--line);
    border-radius:16px; padding:32px 28px; box-shadow:0 20px 60px rgba(0,0,0,.45);
  }
  h1{margin:0 0 4px; font-size:22px; letter-spacing:.2px}
  p.sub{margin:0 0 22px; color:var(--muted); font-size:14px}
  label{display:block; font-size:13px; color:var(--muted); margin:0 0 6px}
  input[type=password],input[type=text]{
    width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--line);
    background:#0e1620; color:var(--ink); font-size:15px; outline:none;
  }
  input:focus{border-color:var(--accent)}
  button{
    width:100%; margin-top:16px; padding:12px 14px; border:0; border-radius:10px;
    background:var(--accent); color:var(--accent-ink); font-size:15px; font-weight:600;
    cursor:pointer;
  }
  button:hover{filter:brightness(1.05)}
  .err{color:var(--err); font-size:13px; min-height:18px; margin-top:10px}
  /* Message screen */
  #message{display:none; text-align:center}
  #message h2{margin:0 0 12px; font-size:22px}
  #message .body{color:var(--muted); font-size:15px; line-height:1.6}
  .logout{
    margin-top:24px; background:transparent; border:1px solid var(--line); color:var(--muted);
    font-weight:500;
  }
  .logout:hover{filter:none; border-color:var(--accent); color:var(--ink)}
</style>
</head>
<body>
  <main class="card">
    <!-- LOGIN SCREEN -->
    <section id="login">
      <h1>Welcome</h1>
      <p class="sub">Please enter the password to continue.</p>
      <form id="loginForm" autocomplete="off">
        <label for="pw">Password</label>
        <input id="pw" type="password" autofocus>
        <button type="submit">Enter</button>
        <div class="err" id="err"></div>
      </form>
    </section>

    <!-- MESSAGE SCREEN -->
    <section id="message">
      <h2>You're in! 🎉</h2>
      <div class="body">
        This is your placeholder message. Replace this text with whatever
        you'd like people to see after they log in.
      </div>
      <button class="logout" id="logout">Log out</button>
    </section>
  </main>

<script>
  // ── SETTINGS ────────────────────────────────────────────────
  // Change this to set the password everyone shares:
  const PASSWORD = "letmein";
  // ────────────────────────────────────────────────────────────
  //
  // NOTE: This is a "simple gate." The password lives in this file,
  // so anyone who views the page source could find it. It keeps casual
  // visitors out — it is NOT strong security for sensitive information.

  const login   = document.getElementById("login");
  const message = document.getElementById("message");
  const form    = document.getElementById("loginForm");
  const pw      = document.getElementById("pw");
  const err     = document.getElementById("err");

  function show(section){
    login.style.display   = section === "login"   ? "block" : "none";
    message.style.display = section === "message" ? "block" : "none";
  }

  form.addEventListener("submit", function(e){
    e.preventDefault();
    if (pw.value === PASSWORD){
      err.textContent = "";
      pw.value = "";
      show("message");
    } else {
      err.textContent = "Incorrect password. Please try again.";
      pw.select();
    }
  });

  document.getElementById("logout").addEventListener("click", function(){
    show("login");
    pw.focus();
  });
</script>
</body>
</html>
