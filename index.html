<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site unavailable</title>
<meta property="og:title" content="Site unavailable">
<meta property="og:description" content="This site is no longer accessible.">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Site unavailable">
<meta name="twitter:description" content="This site is no longer accessible.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #faf9f5;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .card {
    max-width: 380px;
    width: 100%;
    text-align: center;
    padding: 44px 36px;
    background: #fffefb;
    border-radius: 10px;
    box-shadow: 0 1px 3px rgba(45,38,22,.06), 0 12px 30px rgba(45,38,22,.08);
  }
  .seal {
    width: 46px;
    height: 46px;
    margin: 0 auto 22px;
    border-radius: 50%;
    background: #e8e6df;
    border: 1.5px solid #b9c2c6;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .label {
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #a7a196;
    margin-bottom: 24px;
  }
  .divider {
    width: 30px;
    height: 1px;
    background: #dcd6c8;
    margin: 0 auto 24px;
  }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(19px, 4vw, 23px);
    line-height: 1.4;
    color: #25231f;
    margin-bottom: 14px;
  }
  p {
    font-size: clamp(14px, 2.4vw, 15.5px);
    line-height: 1.65;
    color: #6f7a80;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="label">A letter for you</div>
    <div class="divider"></div>
    <div class="seal">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4a5257" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="5" width="18" height="14" rx="2"></rect>
        <path d="M3 7l9 6 9-6"></path>
      </svg>
    </div>
    <h1>This site is no longer accessible.</h1>
    <p>Kindly contact the owner to regain access.</p>
  </div>
</body>
</html>
